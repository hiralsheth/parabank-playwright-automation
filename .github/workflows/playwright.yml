name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to run tests against'
        required: false
        default: 'https://parabank.parasoft.com'
      browser:
        description: 'Browser to run tests on (chromium, firefox, webkit, or all)'
        required: false
        default: 'chromium'

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      CI: true
      BASE_URL: ${{ github.event.inputs.base_url || 'https://parabank.parasoft.com' }}
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: |
        BROWSER="${{ github.event.inputs.browser || 'chromium' }}"
        if [ "$BROWSER" = "all" ]; then
          npx playwright test
        else
          npx playwright test --project="$BROWSER"
        fi

    - name: Upload HTML report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: test-results
        path: test-results/
        retention-days: 7
