name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser project to run (leave empty for all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - chromium
          - firefox
          - webkit

jobs:
  test:
    name: Playwright Tests (${{ github.event.inputs.browser || 'all' }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: |
          BROWSER="${{ github.event.inputs.browser }}"
          if [ "$BROWSER" = "firefox" ]; then
            npm run test:firefox
          elif [ "$BROWSER" = "webkit" ]; then
            npm run test:webkit
          else
            npm run test:chromium
          fi
        env:
          CI: true
          BASE_URL: ${{ vars.BASE_URL || 'https://parabank.parasoft.com' }}

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results on failure (screenshots & traces)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 7
